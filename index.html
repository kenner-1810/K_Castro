<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>📦 Sistema de Inventario</title>
  <style>
    /* ------------------ RESET & BASE ------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #00aaff, #004e92);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      transition: all 0.3s ease;
    }

    h1, h2 {
      color: #004e92;
    }

    /* ------------------ CONTAINER ------------------ */
    .container {
      background: #ffffff;
      width: 95%;
      max-width: 700px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      padding: 30px;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ------------------ BUTTONS ------------------ */
    button {
      background: linear-gradient(135deg, #007bff, #00aaff);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #0062cc, #007bff);
    }

    .secondary-btn {
      background: linear-gradient(135deg, #6c757d, #8d99a6);
    }

    .secondary-btn:hover {
      background: linear-gradient(135deg, #5a6268, #6c757d);
    }

    /* ------------------ FORM ------------------ */
    form {
      text-align: left;
      margin-top: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      color: #004e92;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 6px rgba(0,123,255,0.4);
    }

    /* ------------------ MESSAGES ------------------ */
    .success, .error {
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    /* ------------------ TABLE ------------------ */
    table {
      margin-top: 30px;
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #004e92;
      color: white;
    }

    tr:hover {
      background-color: #f1f9ff;
    }

    /* ------------------ SECTIONS ------------------ */
    .hidden {
      display: none;
    }

    /* ------------------ RESPONSIVE ------------------ */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      button {
        width: 100%;
        margin: 8px 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 🏠 SECCIÓN INICIO -->
    <section id="inicio">
      <h1> Bienvenido al Sistema de Inventario</h1>
      <p style="margin-top:15px;">Selecciona una opción para continuar:</p>
      <button onclick="mostrarSeccion('salida')"> Registrar Salida de Producto</button>
    </section>

    <!-- 📦 SECCIÓN SALIDA DE PRODUCTO -->
    <section id="salida" class="hidden">
      <h1> Registrar Salida de Producto</h1>
      <button class="secondary-btn" onclick="mostrarSeccion('inicio')">⬅ Volver al Inicio</button>

      <form id="formSalida">
        <label for="usuario"> Usuario:</label>
        <input type="text" id="usuario" placeholder="Ingresa tu nombre" required>

        <label for="bodega"> Bodega:</label>
        <select id="bodega" required>
          <option value="">-- Seleccione --</option>
          <option value="bodega1">Bodega 1</option>
          <option value="bodega2">Bodega 2</option>
        </select>

        <label for="producto"> Producto:</label>
        <select id="producto" required>
          <option value="">-- Seleccione --</option>
          <option value="productoA">Producto A</option>
          <option value="productoB">Producto B</option>
        </select>

        <label for="cantidad"> Cantidad:</label>
        <input type="number" id="cantidad" min="1" required placeholder="Ej. 5">

        <button type="submit"> Confirmar Salida</button>
      </form>

      <div id="mensaje"></div>

      <h2 style="margin-top:25px;"> Historial de Salidas</h2>
      <button onclick="exportarHistorial()">📤 Exportar historial</button>
      <table id="tablaHistorial">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Usuario</th>
            <th>Bodega</th>
            <th>Producto</th>
            <th>Cantidad</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script>
    // Control de navegación entre secciones
    function mostrarSeccion(id) {
      document.getElementById("inicio").classList.add("hidden");
      document.getElementById("salida").classList.add("hidden");
      document.getElementById(id).classList.remove("hidden");
    }

    // Inventario simulado
    let inventario = {
      bodega1: { productoA: 500, productoB: 200 },
      bodega2: { productoA: 100 }
    };

    // Historial guardado en localStorage
    let historial = JSON.parse(localStorage.getItem("historialSalidas")) || [];

    const form = document.getElementById('formSalida');
    const mensaje = document.getElementById('mensaje');
    const tablaHistorial = document.getElementById('tablaHistorial').getElementsByTagName('tbody')[0];

    function mostrarMensaje(texto, tipo) {
      mensaje.className = tipo;
      mensaje.innerHTML = texto;
      setTimeout(() => {
        mensaje.innerHTML = "";
        mensaje.className = "";
      }, 4000);
    }

    function limpiarFormulario() {
      form.reset();
    }

    function actualizarTablaHistorial() {
      tablaHistorial.innerHTML = "";
      historial.forEach(reg => {
        let fila = tablaHistorial.insertRow();
        fila.innerHTML = `<td>${reg.fecha}</td><td>${reg.usuario}</td><td>${reg.bodega}</td><td>${reg.producto}</td><td>${reg.cantidad}</td>`;
      });
    }

    function exportarHistorial() {
      let csv = "Fecha,Usuario,Bodega,Producto,Cantidad\n";
      historial.forEach(reg => {
        csv += `${reg.fecha},${reg.usuario},${reg.bodega},${reg.producto},${reg.cantidad}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "historial_salidas.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    // Lógica de registro de salida
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const bodega = document.getElementById('bodega').value;
      const producto = document.getElementById('producto').value;
      const cantidad = parseInt(document.getElementById('cantidad').value, 10);

      if (!inventario[bodega] || !inventario[bodega][producto]) {
        mostrarMensaje(" Error: Producto o bodega no existe.", "error");
        return;
      }

      const stock = inventario[bodega][producto];

      if (cantidad > stock) {
        mostrarMensaje(` Alerta: Solo hay ${stock} unidades disponibles.`, "error");
        return;
      }

      if (!confirm(`¿Confirmas la salida de ${cantidad} unidades de ${producto} desde ${bodega}?`)) {
        return;
      }

      inventario[bodega][producto] -= cantidad;

      const fechaHora = new Date().toLocaleString();
      const registro = { fecha: fechaHora, usuario, bodega, producto, cantidad };
      historial.push(registro);
      localStorage.setItem("historialSalidas", JSON.stringify(historial));

      mostrarMensaje(" Salida registrada correctamente.", "success");
      limpiarFormulario();
      actualizarTablaHistorial();
    });

    actualizarTablaHistorial();
  </script>

</body>
</html>
